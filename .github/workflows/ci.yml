name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  backend:
    name: Backend — Build & Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin
          cache: maven

      - name: Build & run tests
        working-directory: src/meditrack-back
        env:
            SPRING_DATASOURCE_TEST_URL: ${{ secrets.SPRING_DATASOURCE_TEST_URL }}
            SPRING_DATASOURCE_TEST_USERNAME: ${{ secrets.SPRING_DATASOURCE_TEST_USERNAME }}
            SPRING_DATASOURCE_TEST_PASSWORD: ${{ secrets.SPRING_DATASOURCE_TEST_PASSWORD }}
            CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
            CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
            CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
            JWT_SECRET: ${{ secrets.JWT_SECRET }}
            JWT_EXPIRATION: ${{ secrets.JWT_EXPIRATION }}
        run: |
          chmod +x mvnw
          ./mvnw clean verify

  frontend:
    name: Frontend — Build & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/meditrack-front/package-lock.json

      - name: Install dependencies
        working-directory: src/meditrack-front
        run: npm ci

      - name: Lint
        working-directory: src/meditrack-front
        run: npm run lint

      - name: Build
        working-directory: src/meditrack-front
        run: npm run build