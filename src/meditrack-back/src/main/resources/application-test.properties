spring.datasource.url=${SPRING_DATASOURCE_TEST_URL}
spring.datasource.username=${SPRING_DATASOURCE_TEST_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_TEST_PASSWORD}
cloudinary.cloud_name=${CLOUDINARY_CLOUD_NAME:test}
cloudinary.api_key=${CLOUDINARY_API_KEY:test}
cloudinary.api_secret=${CLOUDINARY_API_SECRET:test}
jwt.secret=${JWT_SECRET:test-secret-key-for-testing-only-32chars}
jwt.expiration=${JWT_EXPIRATION:3600000}
spring.jpa.hibernate.ddl-auto=create-drop